# .github/workflows/refresh.yml
# Runs the Voltlas data connectors on a schedule, commits any changes, and
# pushes — which triggers a Vercel redeploy. Hands-off after setup.
#
# Requires one repository secret: EIA_API_KEY  (Settings -> Secrets and
# variables -> Actions -> New repository secret).
name: refresh-data
on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch: {}    # also lets you run it by hand from the Actions tab
permissions:
  contents: write           # allows the workflow to push the refreshed data
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so pull --rebase works before pushing
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"        # cache deps so npm ci is fast after the first run
      - name: Install dependencies
        run: npm ci           # needed for exceljs (used by update-eu-fuels.mjs / update-worldbank.mjs)
      - name: Run connectors
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          node scripts/update-fx.mjs || echo "fx step failed; keeping prior FX rates"
          node scripts/update-eia.mjs
          node scripts/update-eurostat.mjs
          node scripts/update-commodities.mjs
          node scripts/update-fuels.mjs
          node scripts/update-eu-fuels.mjs || echo "eu-fuels step failed; keeping prior EU data"
          node scripts/update-canada.mjs || echo "canada step failed; keeping prior data"
          node scripts/update-mexico.mjs || echo "mexico step failed; keeping prior data"
          node scripts/update-powermix.mjs || echo "powermix step failed; keeping prior data"
          node scripts/update-worldbank.mjs || echo "worldbank step failed; keeping prior commodities"
      - name: Commit and push if data changed
        run: |
          git config user.name "voltlas-bot"
          git config user.email "voltlas-bot@users.noreply.github.com"
          git add public/data/latest.json public/data/commodity-history.json public/data/fuel-history.json public/data/energy-history.json public/data/power-mix.json
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit or push."
          else
            git commit -m "Scheduled data refresh $(date -u +%Y-%m-%d)"
            git pull --rebase origin main || true
            git push
          fi
